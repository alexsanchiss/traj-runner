version: '3.8'

services:
  px4_traj_runner:
    image: px4-traj-runner-22.04
    deploy:
      replicas: 20
      resources:
        limits:
          cpus: "2.0"
        reservations:
          cpus: "2.0"
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"